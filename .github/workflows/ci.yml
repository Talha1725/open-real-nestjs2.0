name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: openreal
          POSTGRES_PASSWORD: openreal_test
          POSTGRES_DB: openreal_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://openreal:openreal_test@localhost:5432/openreal_test
      REDIS_HOST: localhost
      REDIS_PORT: '6379'
      JWT_ACCESS_SECRET: test-access-secret
      JWT_REFRESH_SECRET: test-refresh-secret
      JWT_ACCESS_EXPIRY: 15m
      JWT_REFRESH_EXPIRY: 7d
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run migrations
        run: npx prisma migrate deploy

      - name: Build
        run: npm run build

      - name: Unit tests
        run: npm run test:unit

      - name: Seed database
        run: npm run prisma:seed

      - name: Integration tests
        run: |
          node dist/src/main.js &
          APP_PID=$!

          # Wait for app to be ready (up to 30s)
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3000/api/v1/health > /dev/null 2>&1; then
              echo "App is ready"
              break
            fi
            if [ $i -eq 30 ]; then
              echo "App failed to start within 30s"
              kill $APP_PID 2>/dev/null || true
              exit 1
            fi
            sleep 1
          done

          npm run test:integration
          TEST_EXIT=$?

          kill $APP_PID 2>/dev/null || true
          exit $TEST_EXIT
